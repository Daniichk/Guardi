<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUARD | Personal Growth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #1a1a1a; --accent: #f5f5f7; }
        body.dark { --bg: #121212; --text: #ffffff; --accent: #1e1e1e; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            transition: 0.3s; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0;
        }

        .container { width: 90%; max-width: 400px; padding: 20px; }
        
        h1 { font-size: 36px; margin-bottom: 30px; line-height: 1.2; }
        input { 
            width: 100%; padding: 15px; margin-bottom: 15px; 
            border: none; border-radius: 12px; 
            background: var(--accent); color: var(--text); font-size: 16px;
            box-sizing: border-box;
        }

        .chip-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 25px; }
        .chip { 
            padding: 8px 16px; background: var(--accent); 
            border-radius: 20px; cursor: pointer; font-size: 14px; transition: 0.2s;
        }
        .chip.selected { background: #1a1a1a; color: white; }
        body.dark .chip.selected { background: white; color: black; }

        button { 
            width: 100%; padding: 18px; border: none; border-radius: 15px;
            background: var(--text); color: var(--bg); 
            font-weight: bold; font-size: 18px; cursor: pointer;
        }

        .screen { display: none; }
        .screen.active { display: block; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
    </style>
</head>
<body>

    <div class="container">
        <!-- ЭКРАН 1: РЕГИСТРАЦИЯ -->
        <div id="reg-screen" class="screen active">
            <div class="header">
                <span style="font-weight: bold; letter-spacing: 2px;">GUARD</span>
                <span id="theme-toggle" style="cursor:pointer;">🌓</span>
            </div>
            <h1>Personalize<br>your growth.</h1>
            <input type="text" id="name-input" placeholder="Name">
            <p style="font-size: 12px; color: gray;">CHOOSE TOPICS</p>
            <div class="chip-group" id="topics">
                <div class="chip">Math</div>
                <div class="chip">Python</div>
                <div class="chip">Japanese</div>
                <div class="chip">Web Dev</div>
                <div class="chip">Art</div>
                <div class="chip">Physics</div>
            </div>
            <button onclick="startApp()">Begin Journey</button>
        </div>

        <!-- ЭКРАН 2: ТРЕНАЖЕР -->
        <div id="main-screen" class="screen">
            <p id="welcome-msg" style="color: gray; text-transform: uppercase; font-size: 12px;"></p>
            <h2 id="question-text" style="font-size: 28px; margin: 20px 0;"></h2>
            <input type="text" id="answer-input" placeholder="Your answer">
            <button onclick="checkAnswer()">Verify Answer</button>
        </div>
    </div>

    <script>
        let userName = "";
        let selectedTopics = [];
        let currentCorrect = "";

        // Переключение тем
        document.getElementById('theme-toggle').onclick = () => document.body.classList.toggle('dark');

        // Выбор чипов
        document.querySelectorAll('.chip').forEach(chip => {
            chip.onclick = () => {
                chip.classList.toggle('selected');
                const text = chip.innerText;
                if (selectedTopics.includes(text)) {
                    selectedTopics = selectedTopics.filter(t => t !== text);
                } else {
                    selectedTopics.push(text);
                }
            };
        });

        function startApp() {
            userName = document.getElementById('name-input').value;
            if (!userName || selectedTopics.length === 0) {
                alert("Enter name and pick at least 1 topic!");
                return;
            }
            document.getElementById('reg-screen').classList.remove('active');
            document.getElementById('main-screen').classList.add('active');
            document.getElementById('welcome-msg').innerText = `Hello, ${userName}! Ready?`;
            nextQuestion();
        }

        function nextQuestion() {
            const topic = selectedTopics[Math.floor(Math.random() * selectedTopics.length)];
            let q = "";
            if (topic === "Math") {
                let a = Math.floor(Math.random() * 20) + 10;
                let b = Math.floor(Math.random() * 10) + 2;
                q = `What is ${a} × ${b}?`;
                currentCorrect = (a * b).toString();
            } else if (topic === "Python") {
                q = "Result of len('Vibe')?";
                currentCorrect = "4";
            } else {
                q = `Deep focus on ${topic}. Type '42'`;
                currentCorrect = "42";
            }
            document.getElementById('question-text').innerText = q;
            document.getElementById('answer-input').value = "";
        }

        function checkAnswer() {
            const userAns = document.getElementById('answer-input').value.trim();
            if (userAns === currentCorrect) {
                alert("Correct! Next one.");
                nextQuestion();
            } else {
                alert("Think deeper...");
            }
        }
    </script>
</body>
</html>
